<svg width="240" height="70" viewBox="0 0 240 70" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OnlyTech Logo</title>
  <desc id="desc">Stylized text OnlyTech with a factory icon inside a circle.</desc>
  <defs>
    <linearGradient id="techBlue" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#02a8e5"/>
      <stop offset="100%" stop-color="#1fb4ff"/>
    </linearGradient>
  </defs>
  <!-- Circle with factory -->
  <g transform="translate(8,10)">
    <circle cx="20" cy="20" r="20" fill="none" stroke="#111" stroke-width="2"/>
    <rect x="10" y="22" width="20" height="10" fill="#02a8e5"/>
    <rect x="12" y="18" width="4" height="4" fill="#02a8e5"/>
    <rect x="18" y="14" width="4" height="8" fill="#02a8e5"/>
    <rect x="24" y="16" width="4" height="6" fill="#02a8e5"/>
    <rect x="26" y="18" width="8" height="2" fill="#02a8e5"/>
  </g>
  <!-- Text -->
  <text x="55" y="38" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#111" font-weight="300">Only</text>
  <text x="120" y="38" font-family="Brush Script MT, Pacifico, cursive" font-size="40" fill="url(#techBlue)">Tech</text>
</svg>
